name: Release

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags like v0.1.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: tunic
            release_name: tunic-x86_64-unknown-linux-gnu
          - os: macos-latest
            artifact_name: tunic
            release_name: tunic-x86_64-apple-darwin
          - os: macos-14
            artifact_name: tunic
            release_name: tunic-aarch64-apple-darwin
          - os: windows-latest
            artifact_name: tunic.exe
            release_name: tunic-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Binary
        run: cargo build --release --package tunic-cli

      - name: Rename Binary
        shell: bash
        run: |
          mkdir dist
          cp target/release/${{ matrix.artifact_name }} dist/${{ matrix.release_name }}
          # Legacy names for backward compatibility with v1.0.3/v1.0.5
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then cp dist/${{ matrix.release_name }} dist/tunic-linux; fi
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then cp dist/${{ matrix.release_name }} dist/tunic-macos; fi
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then cp dist/${{ matrix.release_name }} dist/tunic-windows.exe; fi

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
