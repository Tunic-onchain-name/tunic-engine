name: Release

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags like v0.1.0

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: tunic
            release_name: tunic-x86_64-unknown-linux-gnu
          - os: macos-latest
            artifact_name: tunic
            release_name: tunic-x86_64-apple-darwin
          - os: macos-14
            artifact_name: tunic
            release_name: tunic-aarch64-apple-darwin
          - os: windows-latest
            artifact_name: tunic.exe
            release_name: tunic-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Binary
        run: cargo build --release --package tunic-cli

      - name: Rename Binary
        shell: bash
        run: |
          mkdir dist
          cp target/release/${{ matrix.artifact_name }} dist/${{ matrix.release_name }}

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
